services:

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    command: "start-dev --import-realm --hostname-backchannel-dynamic true"

  apisix:
    image: apache/apisix:3.15.0-ubuntu
    depends_on:
      - keycloak
      - flask-app
    ports:
      - "9080:9080"
    environment:
      - APISIX_STAND_ALONE=true
    volumes:
      - ./config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro

  flask-app:
    build: .
    env_file:
      - .env
    expose:
      - "5000"

volumes:
  keycloak-db-data:
