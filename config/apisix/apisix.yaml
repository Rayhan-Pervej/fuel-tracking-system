upstreams:
  - id: flask
    type: roundrobin
    nodes:
      "flask-app:5000": 1

global_rules:
  - id: cors
    plugins:
      cors:
        allow_origins: "http://localhost:3000"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Userinfo"
        expose_headers: "X-Userinfo"
        max_age: 3600
        allow_credentials: true

routes:
  - id: public
    uri: "/api/auth/*"
    upstream_id: flask

  - id: socketio
    uri: "/socket.io/*"
    upstream_id: flask
    enable_websocket: true

  - id: protected
    uri: "/api/*"
    upstream_id: flask
    plugins:
      openid-connect:
        client_id: fuel-backend
        client_secret: "xQib0M6yWr3oJKdVfsRlalHmCOy6I05O"
        discovery: "http://keycloak:8080/realms/fuel-app/.well-known/openid-configuration"
        scope: openid profile
        bearer_only: true
        set_userinfo_header_from_access_token: true
#END
